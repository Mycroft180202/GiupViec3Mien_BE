version: '3.8'

services:
  # 1. PostgreSQL (Relational Database)
  postgres:
    image: postgis/postgis:15-3.4
    container_name: giupviec3mien_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nhat180202@@
      POSTGRES_DB: GiupViec3MienDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Redis (Cache & Session Store)
  redis:
    image: redis:7.0-alpine
    container_name: giupviec3mien_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # 3. RabbitMQ (Message Broker)
  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: giupviec3mien_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # AMQP protocol port
      - "15672:15672" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  # 4. ElasticSearch (Search Engine)
  elasticsearch:
    image: elasticsearch:8.11.1
    container_name: giupviec3mien_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  es_data:
